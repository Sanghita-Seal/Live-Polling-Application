    <path d="M37 47C37 34.8497 46.8497 25 59 25H168C180.15 25 190 34.8497 190 47V122C190 134.15 180.15 144 168 144H83L55 169V144C44.9543 142.165 37 133.36 37 122V47Z" fill="url(#iconGradient)"/>
