<svg width="780" height="190" viewBox="0 0 780 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">PollSync logo</title>
  <desc id="desc">PollSync wordmark with a gradient chat, poll bars, and check mark icon.</desc>
  <defs>
    <linearGradient id="iconGradient" x1="26" y1="38" x2="184" y2="154" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6d35ff"/>
      <stop offset="0.5" stop-color="#2f7cff"/>
      <stop offset="1" stop-color="#00d5ff"/>
    </linearGradient>
    <linearGradient id="wordGradient" x1="365" y1="58" x2="690" y2="142" gradientUnits="userSpaceOnUse">
      <stop stop-color="#eef4ff"/>
      <stop offset="0.42" stop-color="#eef4ff"/>
      <stop offset="0.43" stop-color="#19b8ff"/>
      <stop offset="1" stop-color="#008cff"/>
    </linearGradient>
    <filter id="softGlow" x="0" y="0" width="780" height="190" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#009dff" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
