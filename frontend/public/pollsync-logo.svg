    <path d="M72 105L105 135L200 34" stroke="#111827" stroke-opacity="0.45" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M72 100L105 130L200 29" stroke="url(#iconGradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M72 100L105 130L200 29" stroke="#dff8ff" stroke-opacity="0.42" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
